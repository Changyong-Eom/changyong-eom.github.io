<header class="site-header">
  <nav class="navbar">
    <a class="brand" href="{{ '/' | relative_url }}">Changyong Eom</a>
    <ul class="nav-links">
      {% for item in site.navigation %}
        {% assign current = false %}
        {% if page.url == item.url %}{% assign current = true %}{% endif %}
        <li><a href="{{ item.url | relative_url }}" {% if current %}class="active"{% endif %}>{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </nav>
</header>
